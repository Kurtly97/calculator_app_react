<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calculator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@200;400&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      :root {
        --number-color: #ffffff;
        --beige-text: #453421;
        --narrow: 4px;
        --corners: 4px;
        --beige-def: #eee5dc;
        --orange-text: #993800;
        --orange-def: #e5854d;
        --none: 0px;
        --default: 8px;
        --cal-bg: #221a11;
        --bg: #f2f2f2;
      }

      body {
        font-family: "Inter", sans-serif;
      }

      .calc-button:focus-visible {
        outline: 2px solid var(--number-color);
        outline-offset: 2px;
      }

      .calc-button[data-variant="beige"]:active,
      .calc-button[data-variant="beige"][aria-pressed="true"] {
        background-color: color-mix(in srgb, var(--beige-def) 88%, #000 12%);
      }

      .calc-button[data-variant="orange"]:active,
      .calc-button[data-variant="orange"][aria-pressed="true"] {
        background-color: color-mix(in srgb, var(--orange-def) 88%, #000 12%);
      }
    </style>
  </head>
  <body class="min-h-screen bg-[var(--bg)] flex items-center justify-center p-6">
    <main
      class="bg-[var(--cal-bg)] box-border flex h-[468px] w-[304px] flex-col gap-[12px] items-start overflow-hidden p-5 rounded-[20px] shadow-[-7px_18px_20px_-8px_rgba(0,0,0,0.25)]"
      data-node-id="4:3"
      data-name="main"
    >
      <div
        class="flex h-[84px] w-full min-w-0 shrink-0 items-center justify-end overflow-hidden p-[10px]"
        data-node-id="4:132"
        data-name="Numbers"
      >
        <output
          id="display"
          class="block min-w-0 w-full truncate font-extralight leading-none text-[64px] text-[color:var(--number-color)] text-right"
          for="numpad"
          aria-live="polite"
          aria-atomic="true"
          data-node-id="4:33"
        >
          0
        </output>
      </div>

      <div
        id="numpad"
        class="grid shrink-0 grid-cols-4 gap-[var(--default)] p-[var(--none)]"
        data-node-id="4:125"
        data-name="numpad"
      >
        <button
          type="button"
          class="calc-button flex items-center justify-center p-[var(--narrow)] rounded-[var(--corners)] size-[60px] bg-[var(--beige-def)] text-[24px] text-[color:var(--beige-text)]"
          data-variant="beige"
          data-action="clear"
          aria-label="All clear"
        >
          AC
        </button>
        <button
          type="button"
          class="calc-button flex items-center justify-center p-[var(--narrow)] rounded-[var(--corners)] size-[60px] bg-[var(--beige-def)] text-[24px] text-[color:var(--beige-text)]"
          data-variant="beige"
          data-action="toggle-sign"
          aria-label="Toggle positive or negative"
        >
          +/-
        </button>
        <button
          type="button"
          class="calc-button flex items-center justify-center p-[var(--narrow)] rounded-[var(--corners)] size-[60px] bg-[var(--beige-def)] text-[24px] text-[color:var(--beige-text)]"
          data-variant="beige"
          data-action="percent"
          aria-label="Percent"
        >
          %
        </button>
        <button
          type="button"
          class="calc-button flex items-center justify-center p-[var(--narrow)] rounded-[var(--corners)] size-[60px] bg-[var(--orange-def)] text-[24px] text-[color:var(--orange-text)]"
          data-variant="orange"
          data-action="operator"
          data-value="/"
          aria-label="Divide"
        >
          /
        </button>

        <button
          type="button"
          class="calc-button flex items-center justify-center p-[var(--narrow)] rounded-[var(--corners)] size-[60px] bg-[var(--beige-def)] text-[24px] text-[color:var(--beige-text)]"
          data-variant="beige"
          data-action="digit"
          data-value="7"
          aria-label="7"
        >
          7
        </button>
        <button
          type="button"
          class="calc-button flex items-center justify-center p-[var(--narrow)] rounded-[var(--corners)] size-[60px] bg-[var(--beige-def)] text-[24px] text-[color:var(--beige-text)]"
          data-variant="beige"
          data-action="digit"
          data-value="8"
          aria-label="8"
        >
          8
        </button>
        <button
          type="button"
          class="calc-button flex items-center justify-center p-[var(--narrow)] rounded-[var(--corners)] size-[60px] bg-[var(--beige-def)] text-[24px] text-[color:var(--beige-text)]"
          data-variant="beige"
          data-action="digit"
          data-value="9"
          aria-label="9"
        >
          9
        </button>
        <button
          type="button"
          class="calc-button flex items-center justify-center p-[var(--narrow)] rounded-[var(--corners)] size-[60px] bg-[var(--orange-def)] text-[24px] text-[color:var(--orange-text)]"
          data-variant="orange"
          data-action="operator"
          data-value="*"
          aria-label="Multiply"
        >
          X
        </button>

        <button
          type="button"
          class="calc-button flex items-center justify-center p-[var(--narrow)] rounded-[var(--corners)] size-[60px] bg-[var(--beige-def)] text-[24px] text-[color:var(--beige-text)]"
          data-variant="beige"
          data-action="digit"
          data-value="4"
          aria-label="4"
        >
          4
        </button>
        <button
          type="button"
          class="calc-button flex items-center justify-center p-[var(--narrow)] rounded-[var(--corners)] size-[60px] bg-[var(--beige-def)] text-[24px] text-[color:var(--beige-text)]"
          data-variant="beige"
          data-action="digit"
          data-value="5"
          aria-label="5"
        >
          5
        </button>
        <button
          type="button"
          class="calc-button flex items-center justify-center p-[var(--narrow)] rounded-[var(--corners)] size-[60px] bg-[var(--beige-def)] text-[24px] text-[color:var(--beige-text)]"
          data-variant="beige"
          data-action="digit"
          data-value="6"
          aria-label="6"
        >
          6
        </button>
        <button
          type="button"
          class="calc-button flex items-center justify-center p-[var(--narrow)] rounded-[var(--corners)] size-[60px] bg-[var(--orange-def)] text-[24px] text-[color:var(--orange-text)]"
          data-variant="orange"
          data-action="operator"
          data-value="-"
          aria-label="Subtract"
        >
          -
        </button>

        <button
          type="button"
          class="calc-button flex items-center justify-center p-[var(--narrow)] rounded-[var(--corners)] size-[60px] bg-[var(--beige-def)] text-[24px] text-[color:var(--beige-text)]"
          data-variant="beige"
          data-action="digit"
          data-value="1"
          aria-label="1"
        >
          1
        </button>
        <button
          type="button"
          class="calc-button flex items-center justify-center p-[var(--narrow)] rounded-[var(--corners)] size-[60px] bg-[var(--beige-def)] text-[24px] text-[color:var(--beige-text)]"
          data-variant="beige"
          data-action="digit"
          data-value="2"
          aria-label="2"
        >
          2
        </button>
        <button
          type="button"
          class="calc-button flex items-center justify-center p-[var(--narrow)] rounded-[var(--corners)] size-[60px] bg-[var(--beige-def)] text-[24px] text-[color:var(--beige-text)]"
          data-variant="beige"
          data-action="digit"
          data-value="3"
          aria-label="3"
        >
          3
        </button>
        <button
          type="button"
          class="calc-button flex items-center justify-center p-[var(--narrow)] rounded-[var(--corners)] size-[60px] bg-[var(--orange-def)] text-[24px] text-[color:var(--orange-text)]"
          data-variant="orange"
          data-action="operator"
          data-value="+"
          aria-label="Add"
        >
          +
        </button>

        <button
          type="button"
          class="calc-button col-span-2 flex h-[60px] items-center justify-center p-[var(--narrow)] rounded-[var(--corners)] bg-[var(--beige-def)] text-[24px] text-[color:var(--beige-text)]"
          data-variant="beige"
          data-action="digit"
          data-value="0"
          aria-label="0"
        >
          0
        </button>
        <button
          type="button"
          class="calc-button flex items-center justify-center p-[var(--narrow)] rounded-[var(--corners)] size-[60px] bg-[var(--beige-def)] text-[24px] text-[color:var(--beige-text)]"
          data-variant="beige"
          data-action="decimal"
          data-value="."
          aria-label="Decimal point"
        >
          .
        </button>
        <button
          type="button"
          class="calc-button flex items-center justify-center p-[var(--narrow)] rounded-[var(--corners)] size-[60px] bg-[var(--orange-def)] text-[24px] text-[color:var(--orange-text)]"
          data-variant="orange"
          data-action="equals"
          data-value="="
          aria-label="Equals"
        >
          =
        </button>
      </div>
    </main>

    <script>
      const display = document.getElementById("display");
      const numpad = document.getElementById("numpad");
      const operatorButtons = Array.from(
        document.querySelectorAll('[data-action="operator"]')
      );

      let currentValue = "0";
      let storedValue = null;
      let pendingOperator = null;
      let shouldReplaceDisplay = false;

      const formatDisplay = (value) => {
        if (!Number.isFinite(value)) {
          return "Error";
        }

        return String(value);
      };

      const parseDisplay = () => Number.parseFloat(currentValue);

      const updateDisplay = () => {
        display.textContent = currentValue;
        display.title = currentValue;
      };

      const clearOperatorSelection = () => {
        operatorButtons.forEach((button) => {
          button.setAttribute("aria-pressed", "false");
        });
      };

      const setOperatorSelection = (operator) => {
        clearOperatorSelection();
        const activeButton = operatorButtons.find(
          (button) => button.dataset.value === operator
        );
        activeButton?.setAttribute("aria-pressed", "true");
      };

      const applyOperator = (left, operator, right) => {
        switch (operator) {
          case "+":
            return left + right;
          case "-":
            return left - right;
          case "*":
            return left * right;
          case "/":
            return right === 0 ? Number.NaN : left / right;
          default:
            return right;
        }
      };

      const commitPendingOperation = () => {
        if (pendingOperator === null || storedValue === null) {
          return;
        }

        const result = applyOperator(
          storedValue,
          pendingOperator,
          parseDisplay()
        );
        currentValue = formatDisplay(result);
        storedValue = null;
        pendingOperator = null;
        clearOperatorSelection();
        shouldReplaceDisplay = true;
      };

      const handleClear = () => {
        currentValue = "0";
        storedValue = null;
        pendingOperator = null;
        shouldReplaceDisplay = false;
        clearOperatorSelection();
        updateDisplay();
      };

      const handleToggleSign = () => {
        if (currentValue === "Error" || currentValue === "0") {
          return;
        }

        currentValue = currentValue.startsWith("-")
          ? currentValue.slice(1)
          : `-${currentValue}`;
        updateDisplay();
      };

      const handlePercent = () => {
        if (currentValue === "Error") {
          return;
        }

        currentValue = formatDisplay(parseDisplay() / 100);
        shouldReplaceDisplay = true;
        updateDisplay();
      };

      const handleDigit = (digit) => {
        if (shouldReplaceDisplay || currentValue === "Error") {
          currentValue = digit;
          shouldReplaceDisplay = false;
          updateDisplay();
          return;
        }

        currentValue = currentValue === "0" ? digit : `${currentValue}${digit}`;
        updateDisplay();
      };

      const handleDecimal = () => {
        if (shouldReplaceDisplay || currentValue === "Error") {
          currentValue = "0.";
          shouldReplaceDisplay = false;
          updateDisplay();
          return;
        }

        if (!currentValue.includes(".")) {
          currentValue = `${currentValue}.`;
          updateDisplay();
        }
      };

      const handleOperator = (operator) => {
        if (currentValue === "Error") {
          return;
        }

        const nextValue = parseDisplay();

        if (
          pendingOperator !== null &&
          storedValue !== null &&
          !shouldReplaceDisplay
        ) {
          const result = applyOperator(storedValue, pendingOperator, nextValue);
          currentValue = formatDisplay(result);
          storedValue = Number.isFinite(result) ? result : null;
        } else {
          storedValue = nextValue;
        }

        pendingOperator = operator;
        shouldReplaceDisplay = true;
        setOperatorSelection(operator);
        updateDisplay();
      };

      const handleEquals = () => {
        if (
          pendingOperator === null ||
          storedValue === null ||
          currentValue === "Error"
        ) {
          return;
        }

        commitPendingOperation();
        updateDisplay();
      };

      numpad.addEventListener("click", (event) => {
        const button = event.target.closest("button[data-action]");
        if (!button) {
          return;
        }

        const action = button.dataset.action;
        const value = button.dataset.value ?? "";

        switch (action) {
          case "clear":
            handleClear();
            break;
          case "toggle-sign":
            handleToggleSign();
            break;
          case "percent":
            handlePercent();
            break;
          case "digit":
            handleDigit(value);
            break;
          case "decimal":
            handleDecimal();
            break;
          case "operator":
            handleOperator(value);
            break;
          case "equals":
            handleEquals();
            break;
          default:
            break;
        }
      });

      window.addEventListener("keydown", (event) => {
        const key = event.key;

        if (key === "Escape") {
          event.preventDefault();
          handleClear();
          return;
        }

        if (/^\d$/.test(key)) {
          event.preventDefault();
          handleDigit(key);
          return;
        }

        if (key === ".") {
          event.preventDefault();
          handleDecimal();
          return;
        }

        if (["+", "-", "/", "*"].includes(key)) {
          event.preventDefault();
          handleOperator(key);
          return;
        }

        if (key === "%") {
          event.preventDefault();
          handlePercent();
          return;
        }

        if (key === "Enter" || key === "=") {
          event.preventDefault();
          handleEquals();
        }
      });

      updateDisplay();
    </script>
  </body>
</html>
